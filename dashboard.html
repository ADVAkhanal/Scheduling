<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchedOps Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>
<style>
:root{--bg:#0a0e1a;--sur:#111827;--sur2:#1a2235;--bdr:#1e3a5f;--acc:#00d4ff;--acc2:#0099cc;--acc3:#00ff9f;--wrn:#ffb020;--dng:#ff4757;--txt:#e8f4fd;--dim:#7a9bb5;--wht:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;background-image:radial-gradient(ellipse at 10% 0%,rgba(0,80,160,.15),transparent 60%),radial-gradient(ellipse at 90% 100%,rgba(0,150,100,.08),transparent 60%);}
header{background:linear-gradient(135deg,#0d1b2e,#0a192f);border-bottom:1px solid var(--bdr);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 30px rgba(0,0,0,.5);}
.logo{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:3px;color:var(--acc);text-transform:uppercase;text-shadow:0 0 10px rgba(0,212,255,.2);}
.logo span{color:var(--dim);font-weight:400;}
.hdr-r{display:flex;align-items:center;gap:1.2rem;font-size:.8rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.ldot{width:8px;height:8px;background:var(--acc3);border-radius:50%;box-shadow:0 0 8px var(--acc3);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
.chip{display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .7rem;border-radius:20px;background:rgba(0,255,159,.1);border:1px solid rgba(0,255,159,.3);font-size:.7rem;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--acc3);}
#banner{background:linear-gradient(90deg,rgba(0,212,255,.1),rgba(0,255,159,.06));border-bottom:1px solid rgba(0,212,255,.25);padding:.55rem 2rem;display:flex;align-items:center;gap:.75rem;font-size:.8rem;flex-wrap:wrap;}
#banner.hidden{display:none;}
.bfile{font-family:'Rajdhani',sans-serif;font-weight:600;color:var(--acc);letter-spacing:1px;}
.tabs{background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;padding:0 2rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:0 1.4rem;height:48px;display:flex;align-items:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--dim);white-space:nowrap;transition:all .2s;}
.tab:hover{color:var(--txt);background:rgba(0,212,255,.04);}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);background:rgba(0,212,255,.06);}
.main{padding:1.5rem 2rem;display:flex;flex-direction:column;gap:1.2rem;}
.tc{display:none;flex-direction:column;gap:1.2rem;}
.tc.active{display:flex;}
.row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.lbl{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}
input[type=text],input[type=number],select{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:.45rem .85rem;font-family:'Exo 2',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(0,212,255,.1);}
.btn{font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:.78rem;padding:.45rem 1.1rem;border-radius:6px;border:none;cursor:pointer;transition:all .2s;}
.bp{background:var(--acc);color:#000;box-shadow:0 0 12px rgba(0,212,255,.25);}
.bp:hover{background:#00eeff;transform:translateY(-1px);}
.bo{background:transparent;border:1px solid var(--bdr);color:var(--dim);}
.bo:hover{border-color:var(--acc);color:var(--acc);}
.bd{background:rgba(255,71,87,.1);border:1px solid var(--dng);color:var(--dng);}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.9rem;}
.kcard{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:1.1rem 1.3rem;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--acc));box-shadow:0 0 10px var(--kc,var(--acc));}
.kcard:hover{border-color:var(--acc2);transform:translateY(-2px);}
.klbl{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:.4rem;}
.kval{font-family:'Rajdhani',sans-serif;font-size:1.9rem;font-weight:700;color:var(--wht);line-height:1;}
.ksub{font-size:.7rem;color:var(--dim);margin-top:.3rem;}
.panel{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.4rem;border-bottom:1px solid var(--bdr);}
.pt{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--wht);}
.st{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:.6rem;}
.stags-wrap{padding:1.1rem 1.4rem;}
.sgrid{display:flex;flex-wrap:wrap;gap:.55rem;align-items:center;}
.stag{display:inline-flex;align-items:center;gap:.45rem;padding:.38rem .85rem;border-radius:5px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;border:1px solid;cursor:default;transition:all .2s;}
.stag .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.stag .rmv{display:none;width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.15);align-items:center;justify-content:center;font-size:9px;cursor:pointer;}
.stag:hover .rmv{display:flex;}
.stag .rmv:hover{background:rgba(255,71,87,.5);}
.atb{display:inline-flex;align-items:center;gap:.4rem;padding:.38rem .9rem;border-radius:5px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;border:1px dashed var(--bdr);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;}
.atb:hover{border-color:var(--acc);color:var(--acc);}
.twrap{overflow-x:auto;max-height:58vh;overflow-y:auto;}
.twrap::-webkit-scrollbar{width:5px;height:5px;}
.twrap::-webkit-scrollbar-track{background:transparent;}
.twrap::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
thead{position:sticky;top:0;z-index:5;}
thead th{background:#0c1623;padding:.6rem .85rem;text-align:left;font-family:'Rajdhani',sans-serif;font-size:.67rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--acc);}
tbody tr{border-bottom:1px solid rgba(30,58,95,.3);transition:background .12s;}
tbody tr:hover{background:rgba(0,212,255,.025);}
tbody td{padding:.55rem .85rem;white-space:nowrap;}
.won{font-family:'Rajdhani',sans-serif;font-weight:600;color:var(--acc);font-size:.85rem;}
.opn{color:var(--dim);font-size:.75rem;}
.trunc{max-width:160px;overflow:hidden;text-overflow:ellipsis;font-size:.75rem;color:var(--dim);}
.ld{font-family:'Rajdhani',sans-serif;font-weight:600;}
.overdue{color:var(--dng);}
.due-soon{color:var(--wrn);}
.on-track{color:var(--acc3);}
.cb{display:inline-block;padding:.12rem .45rem;border-radius:3px;font-size:.65rem;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.cy{background:rgba(0,255,159,.1);color:var(--acc3);border:1px solid rgba(0,255,159,.3);}
.cn{background:rgba(100,100,100,.1);color:var(--dim);border:1px solid rgba(100,100,100,.2);}
.ssel{background:transparent;border:1px solid var(--bdr);color:var(--txt);border-radius:4px;padding:.18rem .35rem;font-family:'Exo 2',sans-serif;font-size:.72rem;cursor:pointer;max-width:155px;}
.pgr{display:flex;align-items:center;gap:.4rem;padding:.85rem 1.4rem;border-top:1px solid var(--bdr);justify-content:flex-end;flex-wrap:wrap;}
.pgb{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:1px;padding:.28rem .65rem;border-radius:4px;border:1px solid var(--bdr);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;}
.pgb:hover,.pgb.active{border-color:var(--acc);color:var(--acc);background:rgba(0,212,255,.07);}
.pgb:disabled{opacity:.3;cursor:default;}
.pgi{font-size:.72rem;color:var(--dim);margin:0 .3rem;}
.empty{text-align:center;padding:4rem 2rem;}
.eicon{font-size:3rem;margin-bottom:1rem;opacity:.25;}
.empty h3{font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:.5rem;}
.empty p{font-size:.82rem;color:var(--dim);}
.uzone{border:2px dashed var(--bdr);border-radius:10px;padding:2.5rem;display:flex;flex-direction:column;align-items:center;gap:.85rem;cursor:pointer;transition:all .2s;background:rgba(0,0,0,.15);}
.uzone:hover,.drag-ov{border-color:var(--acc)!important;background:rgba(0,212,255,.04)!important;}
.uzone p{color:var(--dim);font-size:.85rem;text-align:center;}
.uzone strong{color:var(--acc);}
.pbar{background:var(--sur2);border-radius:4px;overflow:hidden;height:4px;margin-top:1rem;}
.pfill{background:var(--acc);height:100%;width:0%;transition:width .3s;box-shadow:0 0 8px var(--acc);}
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;}
.mov.open{display:flex;}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:2rem;width:400px;max-width:95vw;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:mIn .25s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h3{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:1.4rem;}
.fg{margin-bottom:.9rem;}
.fg label{display:block;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:.35rem;font-weight:600;}
.fg input,.fg select{width:100%;}
.sws{display:flex;gap:.45rem;flex-wrap:wrap;}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.sw.sel,.sw:hover{border-color:white;transform:scale(1.2);}
.mac{display:flex;gap:.65rem;margin-top:1.3rem;justify-content:flex-end;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .35s ease both;}
</style>
</head>
<body>
<header>
  <div class="logo">SCHED<span>·</span>OPS <span style="font-size:.65rem;color:var(--dim);letter-spacing:2px">DASHBOARD</span></div>
  <div class="hdr-r"><div class="ldot"></div><span id="clk"></span><span id="rchip"></span></div>
</header>
<div id="banner" class="hidden">
  <span>📋</span><span class="bfile" id="bFile"></span><span style="color:var(--bdr)">·</span>
  <span style="color:var(--dim);font-size:.78rem" id="bMeta"></span>
  <span style="margin-left:auto"><button class="btn bo" style="font-size:.7rem;padding:.28rem .7rem" onclick="ST('upload')">Replace Sheet</button></span>
</div>
<div class="tabs">
  <div class="tab active" onclick="ST('schedule')">📋 Schedule</div>
  <div class="tab" onclick="ST('upload')">⬆ Upload Sheet</div>
  <div class="tab" onclick="ST('settings')">⚙ Settings</div>
</div>
<div class="main">

<!-- SCHEDULE TAB -->
<div class="tc active fi" id="tab-schedule">
  <div class="row">
    <span class="lbl">Filter:</span>
    <input type="text" id="fWC" placeholder="Work Center" style="width:155px" oninput="AF()">
    <input type="text" id="fWO" placeholder="WO #" style="width:92px" oninput="AF()">
    <input type="text" id="fOP" placeholder="Op #" style="width:70px" oninput="AF()">
    <select id="fSt" onchange="AF()" style="width:145px"><option value="">All My Statuses</option></select>
    <select id="fLv" onchange="AF()" style="width:148px">
      <option value="">All Leave Dates</option>
      <option value="overdue">Overdue</option>
      <option value="today">Due Today</option>
      <option value="3">Due ≤ 3 Days</option>
      <option value="7">Due ≤ 7 Days</option>
    </select>
    <button class="btn bo" onclick="CF()">Clear</button>
    <button class="btn bo" onclick="EX()">⬇ CSV</button>
  </div>
  <div class="kgrid">
    <div class="kcard" style="--kc:#00d4ff"><div class="klbl">Total Rows</div><div class="kval" id="k0">—</div><div class="ksub">Current filter view</div></div>
    <div class="kcard" style="--kc:#ff4757"><div class="klbl">Overdue</div><div class="kval" id="k1">—</div><div class="ksub">Past must-leave date</div></div>
    <div class="kcard" style="--kc:#ffb020"><div class="klbl">Due Soon</div><div class="kval" id="k2">—</div><div class="ksub">Within threshold</div></div>
    <div class="kcard" style="--kc:#00ff9f"><div class="klbl">Total Target Hrs</div><div class="kval" id="k3">—</div><div class="ksub">Setup + Current target</div></div>
    <div class="kcard" style="--kc:#a070ff"><div class="klbl">Total Qty Ordered</div><div class="kval" id="k4">—</div><div class="ksub">All filtered rows</div></div>
  </div>
  <div class="panel">
    <div class="stags-wrap">
      <div class="st">Status Tags — assign to rows via dropdown. Hover a tag to remove it.</div>
      <div class="sgrid" id="sgrid"><button class="atb" onclick="OM()">＋ Add Status</button></div>
    </div>
  </div>
  <div class="panel" id="tpanel">
    <div class="ph">
      <div class="pt">Work Orders <span id="rcnt" style="font-size:.72rem;color:var(--dim);font-weight:400;margin-left:.4rem"></span></div>
      <input type="text" id="srch" placeholder="Search anything…" style="width:185px" oninput="DS(this.value)">
    </div>
    <div class="twrap">
      <table><thead><tr>
        <th onclick="SB(0)">WO # ↕</th><th>Part #</th><th onclick="SB(2)">Work Center ↕</th>
        <th onclick="SB(3)">Op # ↕</th><th>Customer</th><th onclick="SB(5)">Must Leave By ↕</th>
        <th onclick="SB(6)">Cust Due ↕</th><th onclick="SB(7)">Qty ↕</th>
        <th onclick="SB(8)">Setup Hrs ↕</th><th onclick="SB(9)">Target Hrs ↕</th>
        <th onclick="SB(10)">Total Hrs ↕</th><th>Complete</th><th>WO Status</th><th>My Status</th>
      </tr></thead>
      <tbody id="tb"></tbody></table>
    </div>
    <div class="pgr" id="pgr"></div>
  </div>
  <div id="es" class="panel" style="display:none">
    <div class="empty"><div class="eicon">📂</div>
      <h3>No Schedule Loaded</h3>
      <p>Upload your weekly Excel schedule to get started.<br>Data persists in your browser until you replace it.</p>
      <br><button class="btn bp" onclick="ST('upload')">Upload Schedule →</button>
    </div>
  </div>
</div>

<!-- UPLOAD TAB -->
<div class="tc fi" id="tab-upload">
  <div class="panel" style="padding:1.75rem;max-width:680px">
    <div class="st" style="margin-bottom:1rem">Upload Weekly Schedule Sheet</div>
    <div id="cbox" class="hidden" style="background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:1rem;margin-bottom:1.4rem;font-size:.82rem">
      <div style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--acc);letter-spacing:1px;margin-bottom:.35rem">CURRENTLY LOADED</div>
      <div id="cdet" style="color:var(--dim)"></div>
      <div style="color:var(--wrn);font-size:.75rem;margin-top:.45rem">⚠ Uploading a new file replaces all current data.</div>
    </div>
    <div class="uzone" id="uz" ondragover="DV(event)" ondragleave="DL()" ondrop="DF(event)" onclick="document.getElementById('fi').click()">
      <div style="font-size:2.2rem;opacity:.35">📂</div>
      <p><strong>Click to browse</strong> or drag & drop your Excel / CSV file</p>
      <p>Auto-maps columns from your schedule · Supports .xlsx · .xls · .csv</p>
    </div>
    <input type="file" id="fi" accept=".xlsx,.xls,.csv" style="display:none" onchange="HF(this)">
    <div id="pw" style="display:none"><div class="pbar"><div class="pfill" id="pf"></div></div>
      <div id="pm" style="margin-top:.65rem;font-size:.8rem;color:var(--dim)"></div>
    </div>
    <div id="pvw" style="display:none;margin-top:1.4rem">
      <div class="st">Preview (first 5 rows)</div>
      <div style="overflow-x:auto;border:1px solid var(--bdr);border-radius:8px">
        <table id="pvt" style="font-size:.75rem;min-width:500px"><thead></thead><tbody></tbody></table>
      </div>
      <div style="margin-top:.9rem;display:flex;gap:.65rem">
        <button class="btn bp" onclick="CI()">✓ Confirm & Load</button>
        <button class="btn bo" onclick="XP()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div class="tc fi" id="tab-settings">
  <div class="panel" style="padding:1.75rem;max-width:500px">
    <div class="st" style="margin-bottom:1.1rem">Dashboard Settings</div>
    <div class="fg"><label>Default Work Center Filter</label><input type="text" id="sWC" placeholder="e.g. Fastems ROBO FMS One-510"></div>
    <div class="fg"><label>Due-Soon Threshold (days)</label><input type="number" id="sTh" value="3" min="1" max="30" style="width:100px"></div>
    <div class="fg"><label>Rows Per Page</label>
      <select id="sRw"><option value="25">25</option><option value="50" selected>50</option><option value="100">100</option><option value="200">200</option></select>
    </div>
    <button class="btn bp" onclick="SS()">Save Settings</button>
    <div style="margin-top:1.75rem;padding-top:1.4rem;border-top:1px solid var(--bdr)">
      <div class="st" style="color:var(--dng);margin-bottom:.65rem">Danger Zone</div>
      <button class="btn bd" onclick="CA()">Clear All Stored Data</button>
    </div>
  </div>
</div>
</div>

<!-- MODAL -->
<div class="mov" id="mov" onclick="CMO(event)">
  <div class="modal">
    <h3>＋ New Status Tag</h3>
    <div class="fg"><label>Label</label><input type="text" id="nl" placeholder="e.g. On Hold"></div>
    <div class="fg"><label>Color</label><div class="sws" id="swc"></div></div>
    <div class="mac"><button class="btn bo" onclick="CM()">Cancel</button><button class="btn bp" onclick="AT()">Add Tag</button></div>
  </div>
</div>

<script>
const SK={data:'so_data',meta:'so_meta',st:'so_st',rst:'so_rst',cfg:'so_cfg'};
let AR=[],FR=[],SD={},pg=1,pp=50,pend=null,sq='';
let cfg={wc:'',th:3,rw:50};
let reg={
  incycle:{label:'In Cycle',color:'#00d4ff'},
  inspection:{label:'At Inspection',color:'#ffb020'},
  inqueue:{label:'In Queue',color:'#a070ff'},
  material:{label:'Waiting – Material',color:'#ff4757'},
  tech:{label:'Waiting – Tech',color:'#00ff9f'},
  maint:{label:'Waiting – Maint.',color:'#ff7830'},
  breakdown:{label:'Machine Breakdown',color:'#ff2828'},
  nooper:{label:'No Operator',color:'#c8a03c'},
};
let rst={};
const SWS=['#00d4ff','#00ff9f','#ffb020','#ff4757','#a070ff','#ff7830','#ff2828','#c8a03c','#78c8ff','#e91e8c','#4caf50','#f4e04d'];
let sc=SWS[0];

window.addEventListener('DOMContentLoaded',async()=>{
  LC();LR();await LRS();RT();BOOT();
  setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
  document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
});

function BOOT(){
  try{
    const raw=localStorage.getItem(SK.data),meta=JSON.parse(localStorage.getItem(SK.meta)||'null');
    if(raw&&meta){AR=JSON.parse(raw);SB2(meta);SCB(meta);AF();}
    else SE();
  }catch(e){SE();}
}

function ST(n){
  ['schedule','upload','settings'].forEach((t,i)=>{document.querySelectorAll('.tab')[i].classList.toggle('active',t===n);});
  document.querySelectorAll('.tc').forEach(c=>c.classList.toggle('active',c.id==='tab-'+n));
}

function LC(){
  try{const s=JSON.parse(localStorage.getItem(SK.cfg)||'{}');cfg={...cfg,...s};
    document.getElementById('sWC').value=cfg.wc||'';
    document.getElementById('sTh').value=cfg.th||3;
    document.getElementById('sRw').value=cfg.rw||50;
    pp=cfg.rw||50;
  }catch(e){}
}
function SS(){
  cfg.wc=document.getElementById('sWC').value.trim();
  cfg.th=parseInt(document.getElementById('sTh').value)||3;
  cfg.rw=parseInt(document.getElementById('sRw').value)||50;
  pp=cfg.rw;localStorage.setItem(SK.cfg,JSON.stringify(cfg));AF();alert('Settings saved!');
}
function LR(){try{const r=JSON.parse(localStorage.getItem(SK.st)||'null');if(r)reg=r;}catch(e){}}
function SR(){localStorage.setItem(SK.st,JSON.stringify(reg));}
async function LRS(){
  try{const res=await fetch('/api/status');if(res.ok){const d=await res.json();if(d)rst=d;}}
  catch(e){try{rst=JSON.parse(localStorage.getItem(SK.rst)||'{}')}catch(e2){}}
}
async function SRS(){
  try{await fetch('/api/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rst)});}
  catch(e){localStorage.setItem(SK.rst,JSON.stringify(rst));}
}

function RT(){
  const g=document.getElementById('sgrid'),b=g.querySelector('.atb');
  g.querySelectorAll('.stag').forEach(t=>t.remove());
  Object.entries(reg).forEach(([k,s])=>{
    const el=document.createElement('div');el.className='stag';el.dataset.key=k;
    el.style.cssText=`background:${s.color}18;border-color:${s.color}55;color:${s.color}`;
    el.innerHTML=`<span class="dot" style="background:${s.color}"></span>${s.label}<span class="rmv" onclick="RMT(this,'${k}')">✕</span>`;
    g.insertBefore(el,b);
  });
  const sel=document.getElementById('fSt'),cur=sel.value;
  sel.innerHTML='<option value="">All My Statuses</option>';
  Object.entries(reg).forEach(([k,s])=>{sel.innerHTML+=`<option value="${k}">${s.label}</option>`;});
  sel.value=cur;
}

const CM2={
  wo:['work order #','work order','wo#','wo #'],
  part:['part #','part#','part number','part'],
  wc:['work center','workcenter','wc'],
  op:['op #','op#','operation','op'],
  qty:['qtyordered','qty ordered','quantity ordered','qty','quantity'],
  cust:['customer','customer name'],
  leave:['wo must leave by','must leave by','leave by','wo must leave'],
  custDue:['cust. due','customer due','due date','cust due'],
  status:['status','wo status'],
  setup:['set-up time (hrs)','setup hrs','setup time','setup hours','set up time (hrs)'],
  target:['hours:current target','current target','target hrs','target hours','hours current target'],
  complete:['complete','completed'],
};
function FC(h,a){for(const x of a){const i=h.findIndex(v=>v&&v.toString().toLowerCase().trim()===x);if(i>=0)return i;}return -1;}
function FD(v){if(!v)return'';if(v instanceof Date)return v.toISOString().split('T')[0];const s=String(v);if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);const d=new Date(s);return isNaN(d)?s:d.toISOString().split('T')[0];}

function PX(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:false});
        let hi=0;
        for(let i=0;i<Math.min(10,raw.length);i++){if(raw[i].filter(c=>c!=null).length>=4){hi=i;break;}}
        const hdrs=raw[hi].map(h=>h?h.toString().toLowerCase().trim():'');
        const ci={};Object.keys(CM2).forEach(k=>{ci[k]=FC(hdrs,CM2[k]);});
        const rows=[];
        for(let i=hi+1;i<raw.length;i++){
          const r2=raw[i];if(!r2||r2.filter(c=>c!=null).length===0)continue;
          const wo=r2[ci.wo];if(!wo)continue;
          const su=parseFloat(r2[ci.setup])||0,tg=parseFloat(r2[ci.target])||0;
          rows.push({wo:String(wo).trim(),part:String(r2[ci.part]||'').trim(),wc:String(r2[ci.wc]||'').trim(),
            op:String(r2[ci.op]||'').trim(),qty:parseInt(r2[ci.qty])||0,cust:String(r2[ci.cust]||'').trim(),
            leave:FD(r2[ci.leave]),custDue:FD(r2[ci.custDue]),status:String(r2[ci.status]||'').trim(),
            setup:su,target:tg,total:parseFloat((su+tg).toFixed(2)),
            complete:String(r2[ci.complete]||'').toLowerCase()==='true'});
        }
        res(rows);
      }catch(err){rej(err);}
    };
    r.onerror=rej;r.readAsArrayBuffer(file);
  });
}

function DV(e){e.preventDefault();document.getElementById('uz').classList.add('drag-ov');}
function DL(){document.getElementById('uz').classList.remove('drag-ov');}
function DF(e){e.preventDefault();DL();const f=e.dataTransfer.files[0];if(f)PF(f);}
function HF(inp){if(inp.files[0])PF(inp.files[0]);inp.value='';}

async function PF(file){
  const pw=document.getElementById('pw'),pf=document.getElementById('pf'),pm=document.getElementById('pm');
  pw.style.display='block';pf.style.width='20%';pm.textContent='Reading file…';
  try{
    pf.style.width='55%';pm.textContent='Parsing rows…';
    const rows=await PX(file);
    pf.style.width='100%';pm.innerHTML=`<span style="color:var(--acc3)">✓ Parsed <strong>${rows.length.toLocaleString()}</strong> rows. Preview below.</span>`;
    pend={file,rows};SPV(rows);
  }catch(err){pm.innerHTML=`<span style="color:var(--dng)">Error: ${err.message}</span>`;}
}

function SPV(rows){
  const pp2=document.getElementById('pvw'),t=document.getElementById('pvt');
  const cols=['wo','part','wc','op','qty','cust','leave','setup','target','total','status'];
  const lbls=['WO #','Part #','Work Center','Op #','Qty','Customer','Leave By','Setup','Target','Total Hrs','WO Status'];
  t.querySelector('thead').innerHTML='<tr>'+lbls.map(l=>`<th style="background:#0c1623;padding:.45rem .7rem;font-family:Rajdhani,sans-serif;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--bdr);white-space:nowrap">${l}</th>`).join('')+'</tr>';
  t.querySelector('tbody').innerHTML=rows.slice(0,5).map(r=>`<tr>${cols.map(c=>`<td style="padding:.45rem .7rem;border-bottom:1px solid rgba(30,58,95,.3);max-width:150px;overflow:hidden;text-overflow:ellipsis">${r[c]??''}</td>`).join('')}</tr>`).join('');
  pp2.style.display='block';
}
function XP(){pend=null;document.getElementById('pvw').style.display='none';document.getElementById('pw').style.display='none';}
function CI(){
  if(!pend)return;
  const{file,rows}=pend;AR=rows;
  const meta={filename:file.name,rows:rows.length,loadedAt:new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})};
  try{localStorage.setItem(SK.data,JSON.stringify(rows));localStorage.setItem(SK.meta,JSON.stringify(meta));}
  catch(e){alert('Storage quota exceeded. Clear old data in Settings first.');return;}
  pend=null;
  document.getElementById('pvw').style.display='none';document.getElementById('pw').style.display='none';
  document.getElementById('es').style.display='none';document.getElementById('tpanel').style.display='';
  SB2(meta);SCB(meta);AF();ST('schedule');
}
function SB2(m){
  document.getElementById('banner').classList.remove('hidden');
  document.getElementById('bFile').textContent=m.filename;
  document.getElementById('bMeta').textContent=`${m.rows.toLocaleString()} rows · loaded ${m.loadedAt}`;
  document.getElementById('rchip').innerHTML=`<span class="chip">● ${m.rows.toLocaleString()} rows</span>`;
}
function SCB(m){
  document.getElementById('cbox').classList.remove('hidden');
  document.getElementById('cdet').innerHTML=`<strong style="color:var(--wht)">${m.filename}</strong><br>${m.rows.toLocaleString()} rows · loaded ${m.loadedAt}`;
}
function SE(){
  document.getElementById('es').style.display='block';
  document.getElementById('tpanel').style.display='none';
  ['k0','k1','k2','k3','k4'].forEach(id=>document.getElementById(id).textContent='—');
}

function DS(q){sq=q.toLowerCase();pg=1;RD();}
function AF(){pg=1;RD();}
function CF(){
  ['fWC','fWO','fOP'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fSt').value='';document.getElementById('fLv').value='';
  document.getElementById('srch').value='';sq='';pg=1;RD();
}

function DC(d){
  if(!d)return'';
  const diff=(new Date(d)-new Date())/86400000;
  if(diff<0)return'overdue';if(diff<=(cfg.th||3))return'due-soon';return'on-track';
}

function RD(){
  if(!AR.length){SE();return;}
  document.getElementById('tpanel').style.display='';document.getElementById('es').style.display='none';
  const wc=document.getElementById('fWC').value.toLowerCase();
  const wo=document.getElementById('fWO').value.toLowerCase();
  const op=document.getElementById('fOP').value.toLowerCase();
  const myst=document.getElementById('fSt').value;
  const lv=document.getElementById('fLv').value;

  FR=AR.filter(r=>{
    if(wc&&!r.wc.toLowerCase().includes(wc))return false;
    if(wo&&!r.wo.toLowerCase().includes(wo))return false;
    if(op&&!r.op.toLowerCase().includes(op))return false;
    if(myst&&(rst[r.wo+'_'+r.op]||'')!==myst)return false;
    if(lv){
      const dc=DC(r.leave);
      if(lv==='overdue'&&dc!=='overdue')return false;
      if(lv==='today'&&r.leave!==new Date().toISOString().split('T')[0])return false;
      if(lv==='3'&&!['overdue','due-soon'].includes(dc))return false;
      if(lv==='7'){const d=(new Date(r.leave)-new Date())/86400000;if(d>7)return false;}
    }
    if(sq&&![r.wo,r.part,r.wc,r.op,r.cust,r.status].join(' ').toLowerCase().includes(sq))return false;
    return true;
  });

  const tp=Math.max(1,Math.ceil(FR.length/pp));
  if(pg>tp)pg=tp;
  const st2=(pg-1)*pp;
  const pr=FR.slice(st2,st2+pp);

  const tb=document.getElementById('tb');tb.innerHTML='';
  pr.forEach(r=>{
    const dc=DC(r.leave);
    const k=r.wo+'_'+r.op,cur=rst[k]||'';
    const opts=Object.entries(reg).map(([kk,s])=>`<option value="${kk}" ${kk===cur?'selected':''}>${s.label}</option>`).join('');
    const ps=r.part.replace(/\s*\(.*\)\s*$/,'').trim()||r.part;
    tb.innerHTML+=`<tr>
      <td><span class="won">${r.wo}</span></td>
      <td><div class="trunc" title="${r.part}">${ps}</div></td>
      <td style="font-size:.75rem">${r.wc}</td>
      <td><span class="opn">${r.op}</span></td>
      <td><div class="trunc" style="color:var(--txt)" title="${r.cust}">${r.cust}</div></td>
      <td><span class="ld ${dc}">${r.leave}</span></td>
      <td style="font-size:.72rem;color:var(--dim)">${r.custDue}</td>
      <td>${r.qty?r.qty.toLocaleString():'—'}</td>
      <td>${r.setup.toFixed(2)}</td>
      <td>${r.target.toFixed(2)}</td>
      <td><strong>${r.total.toFixed(2)}</strong></td>
      <td>${r.complete?'<span class="cb cy">Yes</span>':'<span class="cb cn">No</span>'}</td>
      <td style="font-size:.72rem;color:var(--dim)">${r.status}</td>
      <td><select class="ssel" onchange="SRS2('${k}',this.value)"><option value="">— assign —</option>${opts}</select></td>
    </tr>`;
  });

  document.getElementById('rcnt').textContent=`(${FR.length.toLocaleString()} of ${AR.length.toLocaleString()})`;
  RP(tp);KP(FR);
}

async function SRS2(k,v){if(v)rst[k]=v;else delete rst[k];await SRS();}

function KP(d){
  const th=cfg.th||3;
  document.getElementById('k0').textContent=d.length.toLocaleString();
  document.getElementById('k1').textContent=d.filter(r=>DC(r.leave)==='overdue').length;
  document.getElementById('k2').textContent=d.filter(r=>DC(r.leave)==='due-soon').length;
  document.getElementById('k3').textContent=d.reduce((s,r)=>s+r.total,0).toFixed(1);
  document.getElementById('k4').textContent=d.reduce((s,r)=>s+(r.qty||0),0).toLocaleString();
}

const SK2=['wo','part','wc','op','cust','leave','custDue','qty','setup','target','total'];
function SB(col){
  const k=SK2[col];if(!k)return;
  SD[col]=!SD[col];
  AR.sort((a,b)=>{let av=a[k]??'',bv=b[k]??'';if(typeof av==='number')return SD[col]?av-bv:bv-av;return SD[col]?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));});
  RD();
}

function RP(tp){
  const bar=document.getElementById('pgr');
  if(tp<=1){bar.innerHTML='';return;}
  let h=`<button class="pgb" onclick="GP(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;
  const rng=[];
  for(let i=1;i<=tp;i++){if(i===1||i===tp||Math.abs(i-pg)<=2)rng.push(i);else if(rng[rng.length-1]!=='…')rng.push('…');}
  rng.forEach(p=>{h+=p==='…'?`<span class="pgi">…</span>`:`<button class="pgb ${p===pg?'active':''}" onclick="GP(${p})">${p}</button>`;});
  h+=`<button class="pgb" onclick="GP(${pg+1})" ${pg===tp?'disabled':''}>›</button>`;
  h+=`<span class="pgi">${((pg-1)*pp+1).toLocaleString()}–${Math.min(pg*pp,FR.length).toLocaleString()} of ${FR.length.toLocaleString()}</span>`;
  bar.innerHTML=h;
}
function GP(p){const t=Math.ceil(FR.length/pp);if(p<1||p>t)return;pg=p;RD();document.querySelector('.twrap').scrollTop=0;}

function EX(){
  const hdr=['WO #','Part #','Work Center','Op #','Customer','Must Leave By','Cust Due','Qty','Setup Hrs','Target Hrs','Total Hrs','Complete','WO Status','My Status'];
  const rows=FR.map(r=>[r.wo,r.part,r.wc,r.op,r.cust,r.leave,r.custDue,r.qty,r.setup,r.target,r.total,r.complete?'Yes':'No',r.status,(reg[rst[r.wo+'_'+r.op]]||{label:''}).label].map(v=>`"${String(v??'').replace(/"/g,'""')}"`));
  const csv=[hdr,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`schedule_${new Date().toISOString().split('T')[0]}.csv`;a.click();
}

function OM(){
  document.getElementById('swc').innerHTML=SWS.map(c=>`<div class="sw${c===sc?' sel':''}" style="background:${c}" onclick="PC('${c}',this)"></div>`).join('');
  document.getElementById('nl').value='';
  document.getElementById('mov').classList.add('open');
}
function CM(){document.getElementById('mov').classList.remove('open');}
function CMO(e){if(e.target===document.getElementById('mov'))CM();}
function PC(c,el){sc=c;document.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
function AT(){
  const lbl=document.getElementById('nl').value.trim();if(!lbl)return;
  const k='c_'+Date.now();reg[k]={label:lbl,color:sc};SR();RT();RD();CM();
}
function RMT(el,k){
  if(!confirm(`Remove "${reg[k]?.label}"?`))return;
  el.closest('.stag').remove();delete reg[k];SR();RT();RD();
}

async function CA(){
  if(!confirm('Remove ALL stored schedule data, status assignments, and custom tags?'))return;
  try{await fetch('/api/status',{method:'DELETE'});}catch(e){}
  Object.values(SK).forEach(k=>localStorage.removeItem(k));location.reload();
}
